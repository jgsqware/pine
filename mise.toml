[tools]
go = "1.24"
# ansible-playbook / -vault: real runs, exact plans, fact & service_facts
# gathering, and vault decryption. Without it Pine falls back to simulation.
ansible = "latest"
# node is only used for the `node --check web/app.js` lint (the web UI is
# embedded static assets — no build step).
node = "lts"
glow = "latest"
lazydocker = "latest"

[env]
# Where the Pine server is published by docker-compose (host:container 8743).
PINE_URL = "http://localhost:8743"

[tasks.up]
description = "Build the image and start the Pine stack in the background"
run = "docker compose up --build -d"

[tasks.down]
description = "Stop and remove the Pine stack"
run = "docker compose down"

[tasks.logs]
description = "Follow the Pine container logs"
run = "docker compose logs -f pine"

[tasks.tui]
description = "Open the terminal UI inside the running container (shares its data)"
run = "docker compose exec pine pine tui"

[tasks.open]
description = "Open the Pine web UI in the default browser"
run = '''
url="${PINE_URL:-http://localhost:8743}"
echo "opening $url"
if command -v wslview >/dev/null 2>&1; then wslview "$url"
elif command -v xdg-open >/dev/null 2>&1; then xdg-open "$url"
elif command -v open >/dev/null 2>&1; then open "$url"
elif command -v explorer.exe >/dev/null 2>&1; then explorer.exe "$url"
elif command -v sensible-browser >/dev/null 2>&1; then sensible-browser "$url"
else echo "no browser opener found - visit $url manually"; fi
'''

[tasks.dev]
description = "Build & start the stack, then open the web UI"
depends = ["up"]
run = "mise run open"

[tasks.install]
description = "go install the pine binary with the version stamped from git"
run = '''
version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
buildtime="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
bindir="$(go env GOBIN)"
[ -n "$bindir" ] || bindir="$(go env GOPATH)/bin"
echo "installing pine $version ($buildtime) -> $bindir"
go install -ldflags "-X main.version=$version -X main.buildTime=$buildtime" ./cmd/pine
echo "done: run 'pine version' (ensure $bindir is on PATH)"
'''

[tasks.ship]
description = "Install the binary and restart the running systemd user service onto the new version"
depends = ["install"]
run = '''
unit="pine.service"
if ! command -v systemctl >/dev/null 2>&1; then
  echo "systemctl not found — binary installed, but there is no service to restart"
  exit 0
fi
if ! systemctl --user cat "$unit" >/dev/null 2>&1; then
  echo "$unit is not installed — run 'pine service install' first to set it up, then 'mise run ship' to upgrade it"
  exit 1
fi
# ExecStart points at the binary that `install` just overwrote, so a restart
# brings the service up on the freshly built version.
echo "restarting $unit onto the new binary"
systemctl --user restart "$unit"
systemctl --user --no-pager --lines=0 status "$unit" || true
echo "✓ service restarted — running $(pine version 2>/dev/null || echo 'pine (version unknown)')"
'''
