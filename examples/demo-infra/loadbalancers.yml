---
- name: Configure Acme HAProxy load balancers
  hosts: lb
  become: true
  gather_facts: true
  vars_files:
    - vars/secrets.yml

  pre_tasks:
    - name: Gather facts from all web backends so haproxy.cfg can be rendered
      ansible.builtin.setup:
        gather_subset:
          - network
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['web'] }}"
      run_once: true
      tags: [always]

  roles:
    - role: common
      tags: [common, packages, config]
    - role: haproxy
      tags: [haproxy, lb, config, services]

  post_tasks:
    - name: Check that the virtual IP answers (only needs to run once)
      ansible.builtin.uri:
        url: "http://{{ keepalived_vip | default(hostvars['lb01']['keepalived_vip']) }}/healthz"
        status_code: 200
      register: vip_check
      retries: 3
      delay: 5
      until: vip_check.status == 200
      run_once: true
      delegate_to: lb01
      tags: [verify]
