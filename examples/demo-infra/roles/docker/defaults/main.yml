---
# docker role defaults
docker_edition: ce
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_apt_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_apt_keyring: /etc/apt/keyrings/docker.asc
docker_apt_repo: >-
  deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_keyring }}]
  https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
  {{ ansible_facts['distribution_release'] }} stable
docker_apt_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

docker_data_root: /srv/docker
docker_log_driver: json-file
docker_log_max_size: 50m
docker_log_max_file: 3
docker_live_restore: true
docker_insecure_registries: []
docker_registry_mirror: ""
docker_admin_users: []
