---
# docker role - Docker CE installation and daemon configuration

- name: Install prerequisites for the Docker apt repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'
  tags: [docker, packages]

- name: Create the apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts['os_family'] == 'Debian'
  tags: [docker, packages]

- name: Download the Docker apt signing key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: "{{ docker_apt_keyring }}"
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts['os_family'] == 'Debian'
  tags: [docker, packages]

- name: Add the Docker CE apt repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repo }}"
    filename: docker
    state: present
  when: ansible_facts['os_family'] == 'Debian'
  tags: [docker, packages]

- name: Add the Docker CE yum repository (RedHat family)
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable
    baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/centos/gpg
  when: ansible_facts['os_family'] == 'RedHat'
  tags: [docker, packages]

- name: Install Docker CE packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  notify: Restart docker
  tags: [docker, packages]

- name: Create the Docker data root
  ansible.builtin.file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: "0711"
  tags: [docker, config]

- name: Deploy daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart docker
  tags: [docker, config]

- name: Enable and start the Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
  tags: [docker, services]

- name: Add Acme admins to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_admin_users }}"
  tags: [docker, users]

- name: Verify the Docker daemon answers
  community.docker.docker_host_info:
  register: docker_info
  tags: [docker, verify]

- name: Show Docker version
  ansible.builtin.debug:
    msg: "Docker {{ docker_info.host_info.ServerVersion | default('unknown') }} running on {{ inventory_hostname }}"
  tags: [docker, verify]
