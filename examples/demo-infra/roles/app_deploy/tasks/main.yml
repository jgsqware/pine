---
# app_deploy role - git checkout, env file, systemd unit, health check, rollback

- name: Install application runtime packages
  ansible.builtin.package:
    name:
      - python3
      - python3-venv
      - python3-pip
      - git
    state: present
  tags: [deploy, packages]

- name: Create the application group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true
  tags: [deploy, users]

- name: Create the application service account
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_base_dir }}"
    create_home: false
  tags: [deploy, users]

- name: Create the application directory layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0750"
  loop:
    - "{{ app_base_dir }}"
    - "{{ app_base_dir }}/releases"
    - "{{ app_base_dir }}/shared/log"
  tags: [deploy, config]

- name: Capture the currently deployed version (for rollback)
  ansible.builtin.command:
    cmd: "git -C {{ app_base_dir }}/current rev-parse HEAD"
  register: app_previous_sha
  changed_when: false
  failed_when: false
  tags: [deploy]

- name: Deploy the new release (block with rollback on failure)
  block:
    - name: Check out {{ app_git_version }} from git
      ansible.builtin.git:
        repo: "{{ app_git_repo }}"
        dest: "{{ app_base_dir }}/current"
        version: "{{ app_git_version }}"
        force: true
        accept_newhostkey: true
      become: true
      become_user: "{{ app_user }}"
      notify: Restart acme app
      tags: [deploy, git]

    - name: Install Python dependencies into the venv
      ansible.builtin.pip:
        requirements: "{{ app_base_dir }}/current/requirements.txt"
        virtualenv: "{{ app_base_dir }}/venv"
        virtualenv_command: python3 -m venv
      become: true
      become_user: "{{ app_user }}"
      notify: Restart acme app
      tags: [deploy]

    - name: Render the application environment file
      ansible.builtin.template:
        src: app.env.j2
        dest: "{{ app_base_dir }}/shared/.env"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0640"
      notify: Restart acme app
      tags: [deploy, config]

    - name: Install the gunicorn systemd unit
      ansible.builtin.template:
        src: acme-app.service.j2
        dest: "/etc/systemd/system/{{ app_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify: Restart acme app
      tags: [deploy, systemd]

    - name: Enable and start the application service
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        state: started
        enabled: true
        daemon_reload: true
      tags: [deploy, services]

    - name: Flush handlers so a changed release restarts before checking
      ansible.builtin.meta: flush_handlers
      tags: [always]

    - name: Wait until the application reports healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}{{ app_healthcheck_path }}"
        status_code: 200
      register: app_health
      retries: "{{ app_healthcheck_retries }}"
      delay: "{{ app_healthcheck_delay }}"
      until: app_health.status == 200
      tags: [deploy, verify]

  rescue:
    - name: Roll back to the previously deployed commit
      ansible.builtin.command:
        cmd: "git -C {{ app_base_dir }}/current checkout {{ app_previous_sha.stdout }}"
      when: app_previous_sha.rc == 0 and (app_previous_sha.stdout | length > 0)
      changed_when: true
      tags: [deploy, rollback]

    - name: Restart the application on the previous release
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        state: restarted
      when: app_previous_sha.rc == 0
      tags: [deploy, rollback]

    - name: Fail the play after the rollback completed
      ansible.builtin.fail:
        msg: >-
          Deployment of {{ app_git_version }} failed on {{ inventory_hostname }};
          rolled back to {{ app_previous_sha.stdout | default('nothing - first deploy') }}.

  always:
    - name: Record the deployment attempt
      ansible.builtin.lineinfile:
        path: "{{ app_base_dir }}/shared/log/deploys.log"
        line: >-
          {{ ansible_date_time.iso8601 }} version={{ app_git_version }}
          previous={{ app_previous_sha.stdout | default('none') }}
        create: true
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0640"
      tags: [deploy, logging]
  tags: [deploy]
