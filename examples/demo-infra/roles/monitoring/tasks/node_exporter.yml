---
# node_exporter installed as a native systemd service on every host

- name: Create the node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  tags: [node_exporter, users]

- name: Create the node_exporter install directory
  ansible.builtin.file:
    path: "{{ node_exporter_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [node_exporter]

- name: Download and unpack the node_exporter release tarball
  ansible.builtin.unarchive:
    src: "{{ node_exporter_base_url }}/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "{{ node_exporter_install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "{{ node_exporter_install_dir }}/node_exporter"
  tags: [node_exporter, packages]

- name: Symlink the node_exporter binary into PATH
  ansible.builtin.file:
    src: "{{ node_exporter_install_dir }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    state: link
  tags: [node_exporter]

- name: Install the node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart node_exporter
  tags: [node_exporter, systemd]

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
  tags: [node_exporter, services]

- name: Verify node_exporter answers on its metrics port
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ node_exporter_port }}/metrics"
    return_content: false
    status_code: 200
  register: ne_check
  retries: 5
  delay: 3
  until: ne_check.status == 200
  tags: [node_exporter, verify]
