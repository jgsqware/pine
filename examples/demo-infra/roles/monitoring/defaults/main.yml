---
# monitoring role defaults
monitoring_base_dir: /opt/acme-monitoring

prometheus_image_tag: v2.53.0
prometheus_port: 9090
prometheus_retention: 15d
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 30s
prometheus_node_groups:
  - all

grafana_image_tag: "11.1.0"
grafana_port: 3000
grafana_admin_user: admin
vault_grafana_admin_password: CHANGEME-grafana-admin

alertmanager_image_tag: v0.27.0
alertmanager_port: 9093

node_exporter_version: "1.8.1"
node_exporter_port: 9100
node_exporter_user: node_exporter
node_exporter_base_url: https://github.com/prometheus/node_exporter/releases/download
node_exporter_install_dir: /opt/node_exporter
