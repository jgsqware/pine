# Acme Corp - production inventory (INI format)
# Network plan: 10.0.1.0/24 edge, 10.0.2.0/24 app, 10.0.3.0/24 data,
#               10.0.4.0/24 container, 10.0.5.0/24 ops

[lb]
lb01 ansible_host=10.0.1.11
lb02 ansible_host=10.0.1.12

[web]
web01 ansible_host=10.0.2.11
web02 ansible_host=10.0.2.12
web03 ansible_host=10.0.2.13

[db]
db-primary ansible_host=10.0.3.11
db-replica ansible_host=10.0.3.12

[cache]
redis01 ansible_host=10.0.3.21

[docker_hosts]
dock01 ansible_host=10.0.4.11
dock02 ansible_host=10.0.4.12

[monitoring]
mon01 ansible_host=10.0.5.11

[frontend:children]
lb
web

[backend:children]
db
cache

[acme:children]
frontend
backend
docker_hosts
monitoring

[acme:vars]
ansible_user=acme-deploy
ansible_become=true
ansible_python_interpreter=auto_silent
env_name=production
dc_location=eu-west-1

[web:vars]
app_port=8000
nginx_worker_processes=auto
app_release_channel=stable
