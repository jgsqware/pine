---
# Acme Corp - monitoring tier variables
monitoring_base_dir: /opt/acme-monitoring
prometheus_image_tag: "v2.53.0"
prometheus_port: 9090
prometheus_retention: 30d
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 30s

grafana_image_tag: "11.1.0"
grafana_port: 3000
grafana_admin_user: acme-admin

alertmanager_image_tag: "v0.27.0"
alertmanager_port: 9093

# Inventory groups that get scraped for node metrics.
prometheus_node_groups:
  - lb
  - web
  - db
  - cache
  - docker_hosts
  - monitoring
