---
# Homelab inventory, automation-first style: axes 1+2 only (hosts + OS +
# functional groups). The service axis (docker_hosts, postgresql_hosts, ...)
# is NOT maintained by hand - it is generated by 99-constructed.yml from the
# `services` list each host declares once.
prod:
  children:
    prod_db:
      hosts:
        prod-db:
          ansible_host: 192.168.10.20
          services: [postgresql]
    prod_app:
      hosts:
        prod-app:
          ansible_host: 192.168.10.21
          services: [docker, teamcity-agent]
    prod_vps:
      hosts:
        vps-ovh:
          ansible_host: 51.83.0.10
          services: [docker, teamcity-agent]

dev:
  hosts:
    dev-box:
      ansible_host: 192.168.20.10
      services: [docker, postgresql]

management:
  hosts:
    mgnt:
      ansible_host: 192.168.1.2
      services: [docker, pihole]
