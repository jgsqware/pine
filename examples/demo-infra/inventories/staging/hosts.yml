---
# Acme Corp - staging inventory (YAML format)
all:
  vars:
    env_name: staging
    ansible_user: acme-deploy
    ansible_become: true
    dc_location: eu-west-1
  children:
    web:
      hosts:
        staging-web01:
          ansible_host: 10.10.2.11
          app_port: 8000
          nginx_worker_processes: 2
    db:
      hosts:
        staging-db01:
          ansible_host: 10.10.3.11
          pg_role: primary
    docker_hosts:
      hosts:
        staging-dock01:
          ansible_host: 10.10.4.11
    acme:
      children:
        web: {}
        db: {}
        docker_hosts: {}
