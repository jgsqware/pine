---
# Shared TLS provisioning, pulled into the web play with `import_tasks` so it
# is processed statically — Pine follows the import and shows these tasks
# inline in the playbook visualization.
- name: Create the TLS material directory
  ansible.builtin.file:
    path: /etc/acme/tls
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install the Acme wildcard certificate
  ansible.builtin.copy:
    content: "{{ vault_acme_tls_cert }}"
    dest: /etc/acme/tls/acme-wildcard.pem
    owner: root
    group: root
    mode: "0640"
  notify: Restart rsyslog

- name: Drop the private key into place
  ansible.builtin.copy:
    content: "{{ vault_acme_tls_key }}"
    dest: /etc/acme/tls/acme-wildcard.key
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Verify the certificate and key match
  ansible.builtin.command:
    cmd: openssl x509 -noout -modulus -in /etc/acme/tls/acme-wildcard.pem
  changed_when: false
