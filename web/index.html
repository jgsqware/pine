<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Pine</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1 L16.5 8.5 H7.5 Z" fill="#4ade80"/>
          <path d="M12 5.5 L18 14.5 H6 Z" fill="#34c46a"/>
          <path d="M12 10.5 L20 20.5 H4 Z" fill="#22a356"/>
          <rect x="10.9" y="20" width="2.2" height="3.2" rx="0.6" fill="#8a5a3b"/>
        </svg>
        <span>Pine</span>
        <span class="ver">automation</span>
      </div>

      <a class="nav-item" href="#/dashboard" data-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span>Dashboard</span><span class="kbd-hint">g d</span>
      </a>
      <a class="nav-item" href="#/repos" data-nav="repos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="9" r="2.5"/><path d="M6 8.5v7M18 11.5a9 9 0 0 1-9.5 4.5"/></svg>
        <span>Repositories</span><span class="kbd-hint">g r</span>
      </a>
      <a class="nav-item" href="#/playbooks" data-nav="playbooks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/><path d="M10 7.5l4 2.5-4 2.5z" fill="currentColor" stroke="none"/></svg>
        <span>Playbooks</span><span class="kbd-hint">g p</span>
      </a>
      <a class="nav-item" href="#/roles" data-nav="roles">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>
        <span>Roles</span><span class="kbd-hint">g o</span>
      </a>
      <a class="nav-item" href="#/inventory" data-nav="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="7" rx="2"/><rect x="2" y="14" width="20" height="7" rx="2"/><path d="M6 6.5h.01M6 17.5h.01"/></svg>
        <span>Inventory</span><span class="kbd-hint">g i</span>
      </a>
      <a class="nav-item" href="#/topology" data-nav="topology">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M10.8 7.2L6.2 16.8M13.2 7.2l4.6 9.6M7.5 19h9"/></svg>
        <span>Topology</span><span class="kbd-hint">g t</span>
      </a>
      <a class="nav-item" href="#/hygiene" data-nav="hygiene">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M19 14.5l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9z"/></svg>
        <span>Hygiene</span><span class="kbd-hint">g h</span>
      </a>
      <a class="nav-item" href="#/impact" data-nav="impact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7M8.5 15.5a5 5 0 0 1 0-7"/><path d="M18.4 5.6a9 9 0 0 1 0 12.8M5.6 18.4a9 9 0 0 1 0-12.8"/></svg>
        <span>Impact</span><span class="kbd-hint">g m</span>
      </a>
      <a class="nav-item" href="#/drift" data-nav="drift">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 12 6 12 9 4.5 14.5 19.5 17.5 12 22 12"/></svg>
        <span>Drift</span><span class="kbd-hint">g w</span>
      </a>
      <a class="nav-item" href="#/services" data-nav="services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><path d="M7 7h.01M7 17h.01"/></svg>
        <span>Services</span><span class="kbd-hint">g v</span>
      </a>
      <a class="nav-item" href="#/schedules" data-nav="schedules">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 14.6A9 9 0 1 1 20 7.7"/><path d="M21 3v5h-5"/><path d="M12 7.5V12l3 1.8"/></svg>
        <span>Schedules</span><span class="kbd-hint">g s</span>
      </a>
      <a class="nav-item" href="#/pipelines" data-nav="pipelines">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="6" height="6" rx="1.5"/><rect x="16" y="3" width="6" height="6" rx="1.5"/><rect x="16" y="15" width="6" height="6" rx="1.5"/><path d="M8 12h3M11 6v12M11 6h5M11 18h5"/></svg>
        <span>Pipelines</span><span class="kbd-hint">g l</span>
      </a>
      <a class="nav-item" href="#/jobs" data-nav="jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span>Jobs</span><span class="kbd-hint">g j</span>
      </a>

      <div class="spacer"></div>
      <div class="foot">Pine &middot; open-source automation</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="page-title" id="topbar-title">Dashboard</div>
        <div class="grow"></div>
        <div class="repo-select-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="9" r="2.5"/><path d="M6 8.5v7M18 11.5a9 9 0 0 1-9.5 4.5"/></svg>
          <span>Repo</span>
          <select id="repo-select" title="Current repository"></select>
        </div>
        <button class="btn btn-primary" id="topbar-run">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5l12 7.5-12 7.5z"/></svg>
          Run playbook
        </button>
      </header>
      <main class="content">
        <div id="view"></div>
      </main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
